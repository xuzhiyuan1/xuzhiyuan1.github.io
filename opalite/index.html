<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Opalite</title>
<style>
  :root{ --bg:#0e1016; --panel:#171a22; --panel2:#1e222c; --line:#2a2f3a; --tx:#e7e9ee; --mut:#8b93a3; --acc:#7c9cff; --acc2:#a78bfa; --danger:#ff6b6b; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--tx);font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;-webkit-text-size-adjust:100%}
  .wrap{max-width:820px;margin:0 auto;min-height:100%;display:flex;flex-direction:column}
  /* 登录门 */
  .gate{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;text-align:center}
  .logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:18px;box-shadow:0 10px 30px rgba(124,156,255,.25)}
  .gate h1{margin:0 0 6px;font-size:22px;letter-spacing:.5px}
  .gate p{margin:0 0 22px;color:var(--mut);font-size:13.5px;max-width:340px}
  .field{width:100%;max-width:320px;margin:7px 0}
  input,textarea,select{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--tx);border-radius:12px;padding:12px 14px;font:inherit;outline:none}
  input:focus,textarea:focus{border-color:var(--acc)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--acc);color:#0b0e16;border:none;border-radius:12px;padding:12px 16px;font-weight:600;font-size:15px;cursor:pointer;width:100%;max-width:320px;margin-top:10px}
  .btn:active{transform:translateY(1px)}
  .btn.sec{background:var(--panel2);color:var(--tx);border:1px solid var(--line)}
  .btn.mini{width:auto;padding:7px 12px;font-size:13px;margin:0}
  .btn.danger{color:var(--danger)}
  .err{color:var(--danger);font-size:13px;min-height:18px;margin-top:8px}
  .hint{color:var(--mut);font-size:12px;margin-top:14px}
  /* 内容区 */
  .app{display:none;flex:1;flex-direction:column}
  .top{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(14,16,22,.92);backdrop-filter:blur(8px);z-index:5}
  .top .brand{display:flex;align-items:center;gap:8px;font-weight:700;letter-spacing:.5px}
  .top .brand .dot{width:22px;height:22px;border-radius:7px;background:linear-gradient(135deg,var(--acc),var(--acc2))}
  .top .sp{flex:1}
  .who{color:var(--mut);font-size:12px}
  .cols{flex:1;display:flex;min-height:0}
  .side{width:230px;border-right:1px solid var(--line);overflow:auto;padding:8px}
  .plink{padding:10px 12px;border-radius:10px;cursor:pointer;color:var(--tx);font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .plink:hover{background:var(--panel)}
  .plink.on{background:var(--panel2);color:#fff}
  .plink .t{font-size:11px;color:var(--mut);display:block;margin-top:2px}
  .main{flex:1;overflow:auto;padding:22px 26px;min-width:0}
  .content h1{font-size:24px;margin:.2em 0 .5em}
  .content h2{font-size:19px;margin:1em 0 .4em;border-bottom:1px solid var(--line);padding-bottom:.2em}
  .content h3{font-size:16px;margin:1em 0 .3em}
  .content code{background:var(--panel2);padding:.12em .4em;border-radius:6px;font-size:.9em}
  .content pre{background:var(--panel2);padding:12px;border-radius:10px;overflow:auto}
  .content pre code{background:none;padding:0}
  .content a{color:var(--acc)}
  .content blockquote{border-left:3px solid var(--acc2);margin:.6em 0;padding:.1em 0 .1em 14px;color:var(--mut)}
  .content ul{padding-left:22px}
  .content hr{border:none;border-top:1px solid var(--line);margin:1.2em 0}
  .content table{border-collapse:collapse;margin:.6em 0}
  .content th,.content td{border:1px solid var(--line);padding:6px 10px}
  .rowbtns{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .meta{color:var(--mut);font-size:12px;margin-bottom:16px}
  .editor{display:none;flex-direction:column;gap:10px}
  .editor textarea{min-height:46vh;resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13.5px;line-height:1.55}
  .editor .r{display:flex;gap:10px;align-items:center}
  .editor .r select{width:auto}
  .empty{color:var(--mut);text-align:center;margin-top:60px}
  @media(max-width:620px){
    .cols{flex-direction:column}
    .side{width:auto;border-right:none;border-bottom:1px solid var(--line);display:flex;gap:6px;overflow:auto;padding:8px 10px}
    .plink{flex:0 0 auto}
    .plink .t{display:none}
    .main{padding:18px 16px}
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- 登录门 -->
  <div class="gate" id="gate">
    <div class="logo">🔒</div>
    <h1>Opalite</h1>
    <p>私密空间。内容只存在服务器,不在 GitHub 上。首次进入需输入口令授权本设备,之后本设备免密。</p>
    <div class="field"><input id="pw" type="password" placeholder="口令" autocomplete="off"></div>
    <div class="field"><input id="label" type="text" placeholder="给本设备起个名(可选,如 我的iPhone)" autocomplete="off"></div>
    <button class="btn" id="enterBtn">进入</button>
    <div class="err" id="gateErr"></div>
    <div class="hint" id="gateHint">正在连接…</div>
  </div>

  <!-- 内容区 -->
  <div class="app" id="app">
    <div class="top">
      <div class="brand"><span class="dot"></span> Opalite</div>
      <div class="sp"></div>
      <span class="who" id="who"></span>
      <button class="btn sec mini" id="newBtn">+ 新建</button>
    </div>
    <div class="cols">
      <div class="side" id="side"></div>
      <div class="main">
        <div class="content" id="viewer"></div>
        <div class="editor" id="editor">
          <input id="edTitle" type="text" placeholder="标题">
          <div class="r">
            <select id="edFmt"><option value="md">Markdown</option><option value="html">HTML</option></select>
            <span class="sp" style="flex:1"></span>
            <button class="btn mini" id="saveBtn">保存</button>
            <button class="btn sec mini" id="cancelBtn">取消</button>
          </div>
          <textarea id="edBody" placeholder="在这里写私密内容(支持 Markdown)…"></textarea>
        </div>
      </div>
    </div>
  </div>

</div>
<script>
(function(){
  var BACKEND = "https://opalite.xuzhiyuan1.top";
  var LS_DEV = "opalite_device";
  function uuid(){ return (Date.now().toString(36) + Math.random().toString(36).slice(2,10)); }
  var device = localStorage.getItem(LS_DEV);
  if(!device){ device = uuid(); localStorage.setItem(LS_DEV, device); }

  var $ = function(id){ return document.getElementById(id); };
  var PAGES = [], curId = null, editing = false;

  function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function inl(s){
    return s.replace(/`([^`]+)`/g,function(_,c){return "<code>"+esc(c)+"</code>";})
            .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
            .replace(/\*([^*]+)\*/g,"<em>$1</em>")
            .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  }
  function mdToHtml(md){
    var lines = esc(md).split(/\r?\n/), out=[], list=null, para=[], tbl=null;
    function flushP(){ if(para.length){ out.push("<p>"+inl(para.join("<br>"))+"</p>"); para=[]; } }
    function flushL(){ if(list){ out.push("<ul>"+list.map(function(x){return "<li>"+inl(x)+"</li>";}).join("")+"</ul>"); list=null; } }
    function flushT(){ if(tbl){ var h="<table><thead><tr>"+tbl.head.map(function(c){return "<th>"+inl(c.trim())+"</th>";}).join("")+"</tr></thead><tbody>"+tbl.rows.map(function(r){return "<tr>"+r.map(function(c){return "<td>"+inl(c.trim())+"</td>";}).join("")+"</tr>";}).join("")+"</tbody></table>"; out.push(h); tbl=null; } }
    function flushAll(){ flushP(); flushL(); flushT(); }
    for(var i=0;i<lines.length;i++){
      var ln=lines[i], t=ln.trim();
      if(/^\|(.+)\|$/.test(t)){
        var cells=t.replace(/^\||\|$/g,"").split("|");
        if(/^\s*:?-+:?\s*$/.test(cells[0])){ continue; }
        flushP(); flushL();
        if(!tbl){ tbl={head:cells,rows:[]}; } else { tbl.rows.push(cells); }
        continue;
      } else if(tbl){ flushT(); }
      if(t===""){ flushAll(); continue; }
      if(/^---+$/.test(t)){ flushAll(); out.push("<hr>"); continue; }
      var h=t.match(/^(#{1,4})\s+(.*)$/);
      if(h){ flushAll(); out.push("<h"+h[1].length+">"+inl(h[2])+"</h"+h[1].length+">"); continue; }
      if(/^>\s?/.test(t)){ flushP(); flushL(); out.push("<blockquote>"+inl(t.replace(/^>\s?/,""))+"</blockquote>"); continue; }
      var li=t.match(/^[-*]\s+(.*)$/);
      if(li){ flushP(); if(!list) list=[]; list.push(li[1]); continue; }
      flushL(); para.push(t);
    }
    flushAll();
    return out.join("\n");
  }
  function fmtBJ(iso){ if(!iso) return ""; return String(iso).replace("T"," ").slice(0,16); }

  function api(path, opts){
    return fetch(BACKEND+path, opts).then(function(r){ return r.json().catch(function(){return {ok:false};}).then(function(j){ j.__status=r.status; return j; }); });
  }

  // ---- 登录门 ----
  function showGate(msg){ $("app").style.display="none"; $("gate").style.display="flex"; if(msg) $("gateHint").textContent=msg; }
  function tryEnter(){
    var pw=$("pw").value, label=$("label").value.trim();
    $("gateErr").textContent=""; $("gateHint").textContent="验证中…";
    api("/auth",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({device:device,pass:pw,label:label})})
      .then(function(j){
        if(j && j.ok){ boot(); }
        else { $("gateHint").textContent=""; $("gateErr").textContent = (j&&j.__status===401)?"口令不对":"进入失败,请重试"; }
      })
      .catch(function(){ $("gateHint").textContent=""; $("gateErr").textContent="连不上服务器"; });
  }
  $("enterBtn").addEventListener("click", tryEnter);
  $("pw").addEventListener("keydown", function(e){ if(e.key==="Enter") tryEnter(); });
  $("label").addEventListener("keydown", function(e){ if(e.key==="Enter") tryEnter(); });

  // ---- 内容 ----
  function loadData(){
    return api("/data?device="+encodeURIComponent(device)).then(function(j){
      if(!j||!j.ok){ throw new Error("unauth"); }
      PAGES = j.pages||[]; renderSide();
      if(PAGES.length){ if(!curId || !PAGES.some(function(p){return p.id===curId;})) curId=PAGES[0].id; openPage(curId); }
      else { $("viewer").innerHTML='<div class="empty">还没有私密页面。点右上角 <b>+ 新建</b> 开始。</div>'; }
    });
  }
  function renderSide(){
    var s=$("side"); s.innerHTML="";
    PAGES.slice().sort(function(a,b){return (b.at||"").localeCompare(a.at||"");}).forEach(function(p){
      var d=document.createElement("div");
      d.className="plink"+(p.id===curId?" on":"");
      d.innerHTML=esc(p.title||"未命名")+'<span class="t">'+fmtBJ(p.at)+"</span>";
      d.addEventListener("click", function(){ curId=p.id; editing=false; openPage(p.id); renderSide(); });
      s.appendChild(d);
    });
  }
  function findPage(id){ for(var i=0;i<PAGES.length;i++) if(PAGES[i].id===id) return PAGES[i]; return null; }
  function openPage(id){
    var p=findPage(id); if(!p) return;
    $("editor").style.display="none"; $("viewer").style.display="block";
    var body = p.format==="html" ? p.body : mdToHtml(p.body||"");
    $("viewer").innerHTML =
      '<div class="rowbtns">'
      + '<button class="btn sec mini" id="editBtn">编辑</button>'
      + '<button class="btn sec mini danger" id="delBtn">删除</button>'
      + '</div>'
      + '<div class="meta">更新于 '+fmtBJ(p.at)+'</div>'
      + '<div>'+body+'</div>';
    $("editBtn").addEventListener("click", function(){ openEditor(p); });
    $("delBtn").addEventListener("click", function(){ delPage(p); });
  }
  function openEditor(p){
    editing=true;
    $("viewer").style.display="none"; $("editor").style.display="flex";
    $("edTitle").value = p?(p.title||""):"";
    $("edFmt").value   = (p&&p.format==="html")?"html":"md";
    $("edBody").value  = p?(p.body||""):"";
    $("editor").dataset.pid = p?p.id:"";
  }
  function saveEdit(){
    var pid=$("editor").dataset.pid||"";
    var page={ id:pid, title:$("edTitle").value.trim(), format:$("edFmt").value, body:$("edBody").value };
    $("saveBtn").textContent="保存中…";
    api("/save",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({device:device,page:page})})
      .then(function(j){ $("saveBtn").textContent="保存"; if(j&&j.ok){ curId=j.id; editing=false; loadData(); } else { alert("保存失败"); } })
      .catch(function(){ $("saveBtn").textContent="保存"; alert("连不上服务器"); });
  }
  function delPage(p){
    if(!confirm('删除“'+(p.title||"未命名")+'”?此操作不可恢复。')) return;
    api("/del",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({device:device,id:p.id})})
      .then(function(j){ if(j&&j.ok){ curId=null; loadData(); } });
  }
  $("newBtn").addEventListener("click", function(){ openEditor(null); });
  $("saveBtn").addEventListener("click", saveEdit);
  $("cancelBtn").addEventListener("click", function(){ editing=false; if(curId) openPage(curId); else loadData(); });

  function boot(){
    $("gate").style.display="none"; $("app").style.display="flex";
    api("/whoami?device="+encodeURIComponent(device)).then(function(j){
      $("who").textContent = (j&&j.label)? j.label : "已授权";
    });
    loadData().catch(function(){ showGate(""); });
  }

  // 启动:先探活,再看本设备是否已授权
  api("/ping").then(function(j){
    if(!j||!j.ok){ showGate("服务器暂时连不上,稍后再试"); return; }
    api("/whoami?device="+encodeURIComponent(device)).then(function(w){
      if(w&&w.authorized){ boot(); }
      else { $("gateHint").textContent="首次进入,请输入口令"; }
    });
  }).catch(function(){ showGate("服务器暂时连不上,稍后再试"); });
})();
</script>
</body>
</html>
