<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta name="description" content="LS:实时列出个人网站所有页面的结构与功能,自动从 GitHub 仓库检测,无需手动维护。">
<title>LS · 站点结构</title>
<script src="/opalite/gate.js"></script>
<style>
  :root{--bg:#0e1016;--panel:#171a22;--panel2:#1e222c;--line:#2a2f3a;--tx:#e7e9ee;--mut:#8b93a3;--acc:#7c9cff;--acc2:#a78bfa;--ok:#4ade80;--warn:#fbbf24;}
  *{box-sizing:border-box}html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--tx);font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif}
  .wrap{max-width:820px;margin:0 auto;padding:16px}
  .top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .top .dot{width:22px;height:22px;border-radius:7px;background:linear-gradient(135deg,var(--acc),var(--acc2))}
  .top h1{font-size:19px;margin:0;font-weight:700}
  .top .sp{flex:1}
  a.back{color:var(--mut);font-size:13px;text-decoration:none}a.back:hover{color:var(--tx)}
  .sub{color:var(--mut);font-size:12.5px;margin:0 0 14px}
  .sub a{color:var(--acc);text-decoration:none}
  .grp{margin:18px 0 6px;color:var(--acc2);font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
  .row{border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:10px;background:var(--panel)}
  .row .l1{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .row .url{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;color:var(--acc);text-decoration:none;word-break:break-all}
  .row .url:hover{text-decoration:underline}
  .row .title{color:var(--mut);font-size:12.5px}
  .row .badge{font-size:10.5px;padding:1px 7px;border-radius:20px;border:1px solid var(--line);color:var(--mut);white-space:nowrap}
  .row .badge.ai{color:var(--acc)}.row .badge.meta{color:var(--ok)}.row .badge.redirect{color:var(--warn)}.row .badge.fail{color:#ff6b6b}
  .row .desc{margin-top:6px;font-size:14px}
  .row .desc.none{color:#ff6b6b;font-size:13px}
  .row .mt{color:var(--mut);font-size:11.5px;margin-top:4px}
  .empty{color:var(--mut);text-align:center;margin-top:60px}
  .foothint{color:var(--mut);font-size:12px;margin-top:20px;line-height:1.6}
  #app{display:none}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="top"><span class="dot"></span><h1>LS · 站点结构</h1><span class="sp"></span><a class="back" href="/opalite/">← Opalite</a></div>
  <p class="sub">实时读取 GitHub 仓库,自动列出所有网址及其功能 · <span id="ts"></span> <a href="#" id="refresh">刷新</a></p>
  <div id="list"><div class="empty">正在读取仓库结构…<br><span style="font-size:12px">首次识别新页面会调用 AI 总结,可能稍慢</span></div></div>
  <div class="foothint">
    结构直接从学校服务器上的本地 git 仓库实时遍历,你 push 后即刻反映,无需手动维护此页。<br>
    功能描述:<b style="color:var(--ok)">标注</b>=页面自带 meta / <b style="color:var(--acc)">AI</b>=模型自动总结(按内容哈希缓存,仅变更时重算) / <b style="color:var(--warn)">跳转</b>=重定向页 / <b style="color:#ff6b6b">未识别</b>=暂未能识别,下次会自动重试。
  </div>
</div>
<script>
  function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  function topseg(u){ if(u==="/") return "根目录"; var m=u.replace(/^\//,"").split("/"); return m[0]; }
  function mt(ep){ if(!ep) return ""; try{var d=new Date(ep*1000);return d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2);}catch(e){return "";} }
  var SRC={meta:"标注",ai:"AI识别",redirect:"跳转",fail:"未识别","":"未识别"};
  function row(it){
    var src=it.src||""; var lab=SRC[src]||src;
    var badge='<span class="badge '+(src||"fail")+'">'+esc(lab)+'</span>';
    var desc = it.desc ? '<div class="desc">'+esc(it.desc)+'</div>' : '<div class="desc none">暂未能识别功能(下次自动重试)</div>';
    return '<div class="row"><div class="l1"><a class="url" href="'+esc(it.url)+'" target="_blank" rel="noopener">'+esc(it.url)+'</a>'
      + (it.title?'<span class="title">'+esc(it.title)+'</span>':'') + badge + '</div>'
      + desc + '<div class="mt">'+esc(it.path)+(it.mtime?' · 改于 '+mt(it.mtime):'')+'</div></div>';
  }
  function load(){
    document.getElementById("list").innerHTML='<div class="empty">正在读取仓库结构…<br><span style="font-size:12px">首次识别新页面会调用 AI,可能稍慢</span></div>';
    opaliteFetch("/ls").then(function(j){
      if(!j||!j.ok){ document.getElementById("list").innerHTML='<div class="empty">加载失败,请刷新重试</div>'; return; }
      var items=j.items||[]; var html=""; var cur=null;
      items.forEach(function(it){ var g=topseg(it.url); if(g!==cur){ cur=g; html+='<div class="grp">'+esc(g)+'</div>'; } html+=row(it); });
      document.getElementById("list").innerHTML = items.length ? html : '<div class="empty">仓库里没找到页面</div>';
      document.getElementById("ts").textContent = items.length+" 个页面 · "+String(j.at||"").replace("T"," ").slice(5,16);
    }).catch(function(){ document.getElementById("list").innerHTML='<div class="empty">连不上服务器</div>'; });
  }
  document.getElementById("refresh").addEventListener("click",function(e){e.preventDefault();load();});
  window.addEventListener("opalite:ready",function(){ document.getElementById("app").style.display="block"; load(); });
</script>
</body>
</html>
