<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b3d5c" />
<title>全部行程 · 曼谷之旅</title>
<style>
:root{ --bg:#f4f7f9; --card:#fff; --ink:#1c2b33; --sub:#5b7280; --brand:#0b3d5c; --accent:#0e8f8f; --line:#e3eaef; --done:#9aa7ae; --shadow:0 2px 10px rgba(16,42,67,.12); }
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",Roboto,"Noto Sans SC",sans-serif;padding-bottom:40px}
.hero{position:relative;z-index:1;background:linear-gradient(140deg,#0b3d5c 0%,#0e6e8f 60%,#0e8f8f 100%);color:#fff;padding:18px 18px 26px;border-radius:0 0 22px 22px}
.back{color:#fff;opacity:.85;text-decoration:none;font-size:.88em}
.hero h1{margin:8px 0 4px;font-size:1.3em;font-weight:800;display:flex;align-items:center;gap:6px}
.dur{width:1.1em;height:1.1em;vertical-align:-.18em}
.durfield{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:url(durian.png);background-repeat:repeat;background-size:82px auto;opacity:.14}
.wrap{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:0 14px}
.legend{margin-top:14px;font-size:.8em;color:var(--sub);display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.legend .lg{display:inline-flex;align-items:center;gap:5px}
.legend .sw{width:12px;height:12px;border-radius:4px;display:inline-block}
.card{background:rgba(255,255,255,.82);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);border-radius:16px;padding:16px;margin-top:14px;box-shadow:var(--shadow)}
.card.today{outline:2px solid #f59e0b}
.card h2{margin:0 0 10px;font-size:1.02em;color:var(--brand);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.card h2 .tag{font-size:.68em;color:#b45309;background:#fde68a;padding:2px 8px;border-radius:99px;margin-left:2px}
.item{display:flex;gap:10px;padding:10px 8px;border-bottom:1px dashed var(--line);border-radius:8px;transition:background .3s}
.item:last-child{border-bottom:none}
.item .t{flex:0 0 58px;font-weight:600;font-variant-numeric:tabular-nums;font-size:.92em;display:flex;align-items:center;gap:5px}
.item .b{flex:1;font-size:.95em}
.item .b .n{color:var(--sub);font-size:.82em;margin-top:2px}
.dot{width:8px;height:8px;border-radius:99px;flex:0 0 auto}
/* 已完成：灰暗 */
.item.done{opacity:.5}
.item.done .t{color:var(--done)}
.item.done .b{color:var(--sub)}
.dot.done{background:var(--done)}
/* 未来：普通 */
.item.future .t{color:var(--accent)}
.dot.future{background:#bcd9e4}
/* 当前时段：高亮 */
.item.current{background:linear-gradient(135deg,#fff4e0,#ffe9c7);outline:2px solid #f59e0b;box-shadow:0 2px 10px rgba(245,158,11,.28)}
.item.current .t{color:#b45309;font-weight:800}
.item.current .b{font-weight:600}
.dot.current{background:#f59e0b;box-shadow:0 0 0 4px rgba(245,158,11,.25)}
.item.current .nowtag{font-size:.66em;color:#fff;background:#f59e0b;padding:1px 7px;border-radius:99px;margin-left:6px;vertical-align:1px}
a.map{display:inline-block;font-size:.78em;color:#0e6e8f;text-decoration:none;border:1px solid #bcd9e4;border-radius:99px;padding:1px 9px;margin-left:6px;white-space:nowrap}
footer{text-align:center;color:var(--sub);font-size:.78em;margin-top:18px}
footer a{color:var(--sub)}
</style>
</head>
<body>
<div class="durfield" aria-hidden="true"></div>
<div class="hero">
  <div class="wrap">
    <a class="back" href="index.html">← 返回日程</a>
    <h1>📋 全部行程 <img class="dur" src="durian.png" alt="榴莲"></h1>
    <div style="opacity:.85;font-size:.9em">曼谷之旅 · 2026.07.31 – 08.03</div>
  </div>
</div>
<div class="wrap">
  <div class="legend">
    <span class="lg"><span class="sw" style="background:#9aa7ae"></span>已完成</span>
    <span class="lg"><span class="sw" style="background:#f59e0b"></span>当前 / 下一步</span>
    <span class="lg"><span class="sw" style="background:#bcd9e4"></span>未开始</span>
  </div>
  <div id="days"></div>
  <footer><a href="index.html">返回日程首页</a></footer>
</div>
<script src="data.js"></script>
<script>
function pad(n){ return String(n).padStart(2,"0"); }
function todayKey(){ var d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function render(){
  var now = Date.now();
  var key = todayKey();
  /* 找"当前时段"：第一个尚未开始的 item 即为下一步/当前关注点 */
  var flat = [];
  ITINERARY.forEach(function(day,di){ day.items.forEach(function(it,ii){ flat.push(di+"-"+ii); }); });
  var currentId = null;
  for (var di=0; di<ITINERARY.length && currentId===null; di++){
    for (var ii=0; ii<ITINERARY[di].items.length; ii++){
      if (new Date(ITINERARY[di].items[ii].iso).getTime() > now){ currentId = di+"-"+ii; break; }
    }
  }
  var html = ITINERARY.map(function(day,di){
    var isToday = day.date === key;
    var items = day.items.map(function(it,ii){
      var id = di+"-"+ii;
      var done = new Date(it.iso).getTime() <= now;
      var cls = done ? "done" : (id===currentId ? "current" : "future");
      var tag = (id===currentId) ? '<span class="nowtag">现在</span>' : '';
      return '<div class="item '+cls+'"><div class="t"><span class="dot '+cls+'"></span>'+it.t+'</div>'+
        '<div class="b">'+it.b+tag+(it.n?'<div class="n">'+it.n+'</div>':'')+'</div></div>';
    }).join("");
    return '<div class="card'+(isToday?" today":"")+'"><h2>'+day.title+(isToday?'<span class="tag">今天</span>':'')+'</h2>'+items+'</div>';
  }).join("");
  document.getElementById("days").innerHTML = html;
  var cur = document.querySelector(".item.current");
}
render();
setInterval(render, 30000);
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(function(){});
</script>
</body>
</html>
