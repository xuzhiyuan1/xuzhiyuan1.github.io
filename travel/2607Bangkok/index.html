<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b3d5c" />
<title>曼谷之旅 · 7.31–8.2</title>
<link rel="stylesheet" href="ui/style.css" />
</head>
<body class="pg-index" data-page="index">

<img class="durbg" src="ui/theme.png" alt="" aria-hidden="true">

<div class="topbar">
  <div class="tbInner">
    <div class="tbTitle"><img class="dur" src="ui/theme.png" alt="榴莲"> <span id="brandTitle"></span></div>
    <div class="tabWrap">
      <button class="tabToggle" id="tabToggle">日程 <span class="car">▾</span></button>
      <div class="tabMenu" id="tabMenu" hidden>
        <button data-tab="plan" class="active">日程</button>
        <button data-tab="jz">机酒</button>
        <button data-tab="guide">攻略本</button>
      </div>
    </div>
    <div class="selWrap">
      <select class="whoSel" id="who" aria-label="选择角色"></select>
      <span class="selCar">▾</span>
    </div>
  </div>
</div>

<div class="heroSub">
  <img class="heroDur" src="ui/theme.png" alt="" aria-hidden="true">
  <div class="wrap">
    <div class="dates" id="heroDates"></div>
    <span class="tag" id="heroTag"></span>
  </div>
</div>

<div class="wrap">

  <!-- 下拉刷新指示条：移动端下拉手势 / 桌面端鼠标下拉或点击，显示"数据最新改动时间" -->
  <div class="pullBanner" id="pullBanner">
    <div class="pullSpacer" id="pullSpacer"></div>
    <div class="pullRow" id="pullRow" role="button" tabindex="0" aria-label="下拉或点击刷新数据">
      <span class="pullIcon" id="pullIcon">⌄</span>
      <span class="pullStatus" id="pullStatus">下拉刷新</span>
      <span class="pullDot">·</span>
      <span class="pullTime" id="pullTime">加载中…</span>
    </div>
  </div>

  <!-- ============ 日程 ============ -->
  <section id="panePlan">

    <!-- 此刻关注：标题 / 倒计时 / 说明 / 完整下一个日程 / Next -->
    <div class="card now">
      <div class="nowHd">📍 此刻关注 · 下一个日程</div>
      <div class="nowCd" id="nowCd"></div>
      <div class="nowCap">倒计时（按本机时间，泰国=中国−1小时）</div>
      <div class="nowFull" id="nowNextLabel">—</div>
      <div class="nowRow">
        <div class="nowAfter" id="nowAfter"></div>
        <div class="nowWx" id="nowWx"></div>
      </div>
    </div>

    <!-- 逐日行程 + 动态插入的地图卡 + 末尾"全部行程"（脚本渲染） -->
    <div id="dayCards"></div>

    <!-- 榴莲专区 -->
    <div class="card">
      <h2><img class="dur" src="ui/theme.png" alt="榴莲"> 榴莲大作战</h2>
      <ul class="tips" id="durianList"></ul>
    </div>

    <!-- 实用提醒（含详细天气） -->
    <div class="card">
      <h2>📌 实用提醒</h2>
      <ul class="tips" id="tipsList"></ul>
    </div>

  </section>

  <!-- ============ 机酒 ============ -->
  <section id="paneJz" hidden>
    <div class="card">
      <h2>✈️ 航班 <button class="tzbtn" id="tzbtn">🕐 北京时间</button></h2>
      <div id="flightBox"></div>
      <div class="note">默认 <b>北京时间</b>，点按钮切 <b>泰国时间</b>（泰国比北京慢 1 小时）。切角色看自己的，"总览"看全部人。唐娅妮票价待补充。</div>
    </div>
    <div class="card">
      <h2>🏨 酒店（已确认）</h2>
      <div id="hotelBox"></div>
    </div>
  </section>

  <!-- ============ 攻略本 ============ -->
  <section id="paneGuide" hidden>
    <div class="card">
      <h2>📖 攻略本</h2>
      <div class="note">大家跟小王子分享攻略、提问的时候，小王子会自动帮忙整理在这里～</div>
    </div>
    <div id="guideCards"></div>
  </section>

  <div class="devbar">
    设备编号 <span class="devid" id="devId">—</span>　·　默认角色 <span class="defrole" id="defRole">—</span><br>
    <span style="opacity:.8">切换角色后本设备下次自动显示该角色</span>
  </div>

  <footer>曼谷之旅 <img class="dur" src="ui/theme.png" alt="榴莲"> · <a href="/">Powered by xuzhiyuan</a></footer>
</div>

<img class="princeFab" id="princeFab" src="ui/prince.png" alt="小助手" title="点我告诉小王子想怎么改行程">

<script src="ui/app.js"></script>
</body>
</html>
