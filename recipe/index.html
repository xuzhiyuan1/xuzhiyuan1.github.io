<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#d97742" />
<title>Recipe · 我的菜谱</title>
<meta name="description" content="记录我所有熟练菜品的烹制方式 — 炒菜、西餐、甜品烘焙、其他。" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🍳%3C/text%3E%3C/svg%3E" />
<link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

<header class="site-nav">
  <div class="inner">
    <div class="brand"><span class="logo"></span> Recipe · 我的菜谱</div>
    <nav class="nav-links">
      <a href="./" class="active">首页</a>
      <a href="./chaocai/">炒菜</a>
      <a href="./xican/">西餐</a>
      <a href="./tianpin/">甜品</a>
      <a href="./qita/">其他</a>
    </nav>
  </div>
</header>

<main class="container">

  <section class="intro">
    <div class="badge">RECIPE COLLECTION</div>
    <h1>把每一道拿手菜,稳稳记下来</h1>
    <p class="lead">记录我所有熟练菜品的烹制方式 — 从家常炒菜到西餐甜品,一份随时能翻的私人菜谱。</p>
  </section>

  <section class="categories" id="categories">
    <!-- 由 JS 渲染 -->
  </section>

</main>

<footer class="site-footer">
  © Recipe · 私人菜谱 · 由小王子 👑 协助维护
</footer>

<script src="assets/js/assistant.js"></script>
<script>
  // 加载分类清单并渲染卡片
  fetch('_data/categories.json')
    .then(function (r) { return r.json(); })
    .then(function (data) {
      var wrap = document.getElementById('categories');
      var html = data.categories.map(function (c) {
        return ''
          + '<a class="cat-card ' + c.key + '" href="./' + c.slug + '/">'
          +   '<div class="emoji">' + c.emoji + '</div>'
          +   '<h2>' + c.name + '</h2>'
          +   '<div class="desc">' + c.desc + '</div>'
          +   '<span class="count">查看 →</span>'
          +   '<div class="deco"></div>'
          + '</a>';
      }).join('');
      wrap.innerHTML = html;
    })
    .catch(function () {
      document.getElementById('categories').innerHTML =
        '<div class="empty"><div class="emoji">🍳</div>分类加载失败,请稍后再试。</div>';
    });
</script>

</body>
</html>
