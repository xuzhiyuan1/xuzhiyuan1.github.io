<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta name="description" content="私密工具集:模型 API 余额汇总、LS 站点结构等。">
<title>Tools</title>
<script src="/tools/gate.js"></script>
<style>
  :root{--bg:#0e1016;--panel:#171a22;--panel2:#1e222c;--line:#2a2f3a;--tx:#e7e9ee;--mut:#8b93a3;--acc:#7c9cff;--acc2:#a78bfa;}
  *{box-sizing:border-box}html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--tx);font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif}
  .wrap{max-width:640px;margin:0 auto;padding:22px 16px}
  .hd{display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .hd .dot{width:24px;height:24px;border-radius:8px;background:linear-gradient(135deg,var(--acc),var(--acc2))}
  .hd h1{font-size:20px;margin:0;font-weight:700}
  .sub{color:var(--mut);font-size:13px;margin:0 0 18px}
  .cards{display:grid;gap:12px}
  a.card{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;text-decoration:none;color:var(--tx)}
  a.card:hover{border-color:var(--acc)}
  a.card .ic{width:46px;height:46px;border-radius:12px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:24px;flex:0 0 auto}
  a.card .t{font-weight:700;font-size:16px}
  a.card .d{color:var(--mut);font-size:12.5px}
  #app{display:none}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="hd"><span class="dot"></span><h1>Tools</h1></div>
  <p class="sub">私密工具集 · 仅授权设备可见</p>
  <div class="cards">
    <a class="card" href="/tools/models/"><div class="ic">💰</div><div><div class="t">Model API</div><div class="d">各家大模型 API 余额汇总,一键跳转充值</div></div></a>
    <a class="card" href="/tools/ls/"><div class="ic">🗂</div><div><div class="t">LS</div><div class="d">站点结构 · 每个网址的功能(自动检测)</div></div></a>
  </div>
</div>
<script>window.addEventListener("opalite:ready",function(){document.getElementById("app").style.display="block";});</script>
</body>
</html>
